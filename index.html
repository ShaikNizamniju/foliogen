  <script>
    const path = window.location.pathname;
    if (path.startsWith('/p/') || path.startsWith('/u/')) {
      const rawName = path.split('/').filter(Boolean)[1] || '';
      const formattedName = rawName.replace(/-/g, ' ')
        .split(' ')
        .map(function (word) { return word.charAt(0).toUpperCase() + word.slice(1); })
        .join(' ');
      if (formattedName) {
        document.title = formattedName + ' | AI Portfolio';
        var ogt = document.querySelector('meta[property="og:title"]');
        if (ogt) ogt.setAttribute('content', formattedName + ' | AI Portfolio');
      }
      var canon = document.querySelector('link[rel="canonical"]');
      if (canon) canon.setAttribute('href', window.location.origin + window.location.pathname);
    }
  </script>
